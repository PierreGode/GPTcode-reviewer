name: "GPT Code Review Action"
description: "Performs code reviews and posts PR summaries using OpenAI."

inputs:
  G_TOKEN:
    description: "Custom GitHub token to interact with the repository."
    required: true
  OPENAI_API_KEY:
    description: "OpenAI API key for GPT."
    required: true
  OPENAI_API_MODEL:
    description: "OpenAI API model to use (e.g., gpt-4o-mini)."
    required: false
    default: "gpt-4o-mini"
  REVIEW_MAX_COMMENTS:
    description: "Maximum number of comments to include in the review (per diff)."
    required: false
    default: "3"
  REVIEW_PROJECT_CONTEXT:
    description: "Project context to include in the review (e.g., TypeScript with NestJS)."
    required: false
    default: ""
  exclude:
    description: "Glob patterns to exclude files from the diff analysis."
    required: false
    default: ""

runs:
  using: "node16"
  main: "dist/index.js"
branding:
  icon: "aperture"
  color: "gray-dark"
